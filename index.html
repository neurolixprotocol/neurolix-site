<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurolix Protocol — Confidential AI Compute Infrastructure</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="description" content="Neurolix Protocol is a DePIN infrastructure for confidential AI compute on regulated data. Hardware-enforced privacy, verified on-chain.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a2234;
    --border: #1f2937;
    --text-primary: #f3f4f6;
    --text-secondary: #9ca3af;
    --accent: #00E5FF;
    --accent-dim: rgba(0, 229, 255, 0.1);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    background: rgba(10, 14, 26, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
    z-index: 100;
  }

  nav .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text-primary); }

  /* HERO */
  .hero {
    padding: 120px 0 80px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .hero-badge {
    display: inline-block;
    padding: 6px 14px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .hero h1 {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: 20px;
    color: var(--text-secondary);
    max-width: 720px;
    margin: 0 auto 40px;
  }

  .hero-cta {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg-primary);
  }

  .btn-primary:hover { background: #00b8cc; }

  .btn-secondary {
    background: transparent;
    color: var(--text-primary);
    border-color: var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* SECTIONS */
  section {
    padding: 80px 0;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }

  .section-subtitle {
    font-size: 18px;
    color: var(--text-secondary);
    max-width: 700px;
    margin-bottom: 48px;
  }

  /* ABOUT */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
  }

  .about-block h3 { font-size: 20px; margin-bottom: 12px; }
  .about-block p { color: var(--text-secondary); margin-bottom: 16px; }

  /* FEATURES */
  .features-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .feature-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
  }

  .feature-icon {
    width: 40px; height: 40px;
    background: var(--accent-dim);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px; font-size: 20px;
  }

  /* PROOF */
  .proof-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 48px;
  }

  .proof-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0; border-bottom: 1px solid var(--border);
  }

  .proof-value {
    font-family: monospace; color: var(--accent);
  }

  .proof-value a { color: var(--accent); text-decoration: none; }

  /* VIDEO */
  .video-container {
    max-width: 800px; margin: 48px auto 0;
  }

  .video-wrapper {
    position: relative; padding-bottom: 56.25%; height: 0;
    overflow: hidden; border-radius: 12px; border: 1px solid var(--border);
  }

  .video-wrapper iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }

  /* CONTACT BOX - RESET DEFINITIVO */
  .contact-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px;
    text-align: center;
  }

  .contact-email, .contact-email:visited {
    font-size: 24px;
    color: #00E5FF !important;
    text-decoration: none !important;
    font-weight: 600;
    display: inline-block;
    margin: 16px 0 24px;
  }

  .contact-links {
    display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
  }

  .contact-links a, .contact-links a:visited {
    color: #f3f4f6 !important;
    text-decoration: none !important;
    font-size: 14px;
    padding: 8px 16px;
    border: 1px solid #1f2937 !important;
    border-radius: 8px;
  }

  .contact-links a:hover {
    color: #00E5FF !important;
    border-color: #00E5FF !important;
  }

  /* FOOTER */
  footer { padding: 48px 0 32px; text-align: center; }
  .disclaimer { font-size: 12px; color: var(--text-secondary); margin-top: 24px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .hero h1 { font-size: 36px; }
    .about-grid { grid-template-columns: 1fr; }
    .features-grid { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .contact-box { padding: 32px 15px; }
    .contact-email { 
      font-size: 16px !important; 
      white-space: nowrap !important;
    }
  }
